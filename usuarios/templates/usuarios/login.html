<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FaceGuard Bus - Login</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="font-display text-4xl font-bold text-blue-800 mb-6 text-center">Bem vindo!</h2>
        <h2 class= "text-sm font-semibold mt-8 text-center pb-10">Preencha os campos para entrar na sua conta</h2>
        
        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <p class="text-sm p-3 rounded font-semibold align-middle text-center
                        {% if message.tags == 'error' %} bg-red-100 text-red-700 
                        {% elif message.tags == 'warning' %} bg-yellow-100 text-yellow-700 
                        {% else %} bg-green-100 text-green-700 {% endif %}">
                        {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="email" name="email" placeholder="E-mail" required 
                class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-700 focus:ring-1 focus:ring-blue-500">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                
                <div class="relative">
                    <input type="password" id="senha" name="senha" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 pr-10">
                    
                    <button type="button" onclick="toggleSenha('senha', 'eye-senha', 'eye-slash-senha')" 
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 flex items-center">
                        
                        <svg id="eye-senha" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        
                        <svg id="eye-slash-senha" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" 
                    class="font-display w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 px-4 rounded transition duration-200">
                Entrar
            </button>
        </form>
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Não tem uma conta? <a href="{% url 'cadastro' %}" class="text-blue-600 hover:underline font-medium">Cadastre-se</a></p>
        </div>
    </div>
    <script>
        function toggleSenha(inputId, eyeId, eyeSlashId) {
            const input = document.getElementById(inputId);
            const eyeIcon = document.getElementById(eyeId);
            const eyeSlashIcon = document.getElementById(eyeSlashId);

            if (input.type === "password") {
                input.type = "text";
                eyeIcon.classList.add("hidden"); // Esconde o olho aberto
                eyeSlashIcon.classList.remove("hidden"); // Mostra o olho com risco
            } else {
                input.type = "password";
                eyeIcon.classList.remove("hidden");
                eyeSlashIcon.classList.add("hidden");
            }
        }
    </script>
</body>
</html>
