{% extends 'base.html' %}
{% block content %}
<div class="h-screen bg-gray-900 flex flex-col items-center justify-center relative overflow-hidden">
    
    <div id="painel-status" class="absolute top-10 z-50 bg-black/80 text-white px-8 py-4 rounded-full border-2 border-gray-600 text-xl font-bold tracking-wider transition-colors duration-300">
        📷 Câmera Ativa: Analisando rostos...
    </div>

    <div class="relative w-full max-w-4xl rounded-2xl overflow-hidden border-4 border-gray-700 shadow-2xl">
        <video id="webcam" autoplay playsinline class="w-full h-auto transform -scale-x-100"></video>
        
        <div class="absolute top-0 left-0 w-full h-1 bg-green-500 opacity-50 shadow-[0_0_15px_#22c55e] animate-[scan_2s_ease-in-out_infinite]"></div>
    </div>

    <canvas id="canvas-oculto" class="hidden"></canvas>
</div>

<style>
    @keyframes scan {
        0%, 100% { top: 0; }
        50% { top: 100%; }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas-oculto');
        const ctx = canvas.getContext('2d');
        const painelStatus = document.getElementById('painel-status');
        
        let analisando = false;

        //Liga a Webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => {
                painelStatus.innerText = "❌ Erro ao acessar câmera";
                painelStatus.className = "absolute top-10 z-50 bg-red-900 text-white px-8 py-4 rounded-full border-2 border-red-500 text-xl font-bold";
            });

        //A cada 3 segundos tenta achar um rosto
        setInterval(() => {
            if (analisando) return; // Espera a última análise terminar

            // Pega o frame atual do vídeo e desenha no canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Transforma em Base64
            const frameBase64 = canvas.toDataURL('image/jpeg', 0.8);

            analisando = true;

            // Envia silenciosamente para o Django
            fetch('/transporte/api/reconhecimento/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ imagem: frameBase64 })
            })
            .then(res => res.json())
            .then(dados => {
                if (dados.status === 'sucesso') {
                    // Feedback Visual de Sucesso
                    painelStatus.innerHTML = `✅ ${dados.tipo}: ${dados.aluno} autorizado!`;
                    painelStatus.className = "absolute top-10 z-50 bg-green-600 text-white px-8 py-4 rounded-full border-2 border-green-400 text-xl font-bold scale-110 transition-transform duration-300";
                    
                } else if (dados.status === 'desconhecido') {
                    // Feedback Visual de Alerta
                    painelStatus.innerHTML = `⚠️ Face Desconhecida!`;
                    painelStatus.className = "absolute top-10 z-50 bg-red-600 text-white px-8 py-4 rounded-full border-2 border-red-400 text-xl font-bold";
                    
                } else if (dados.status === 'erro') {
                    // NOVO: Feedback Visual de Erro (Ex: Nenhuma rota ativa)
                    painelStatus.innerHTML = `❌ Erro do Sistema: ${dados.mensagem}`;
                    painelStatus.className = "absolute top-10 z-50 bg-orange-600 text-white px-8 py-4 rounded-full border-2 border-orange-400 text-xl font-bold";
                    
                } else {
                    // Volta ao normal (Nenhum rosto na tela)
                    painelStatus.innerHTML = `📷 Câmera Ativa: Analisando rostos...`;
                    painelStatus.className = "absolute top-10 z-50 bg-black/80 text-white px-8 py-4 rounded-full border-2 border-gray-600 text-xl font-bold tracking-wider";
                }
                analisando = false;
            })
            .catch(err => { analisando = false; });

        }, 3000); //3 segundos
    });
</script>
{% endblock %}
