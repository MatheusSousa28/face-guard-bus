<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceGuard Bus</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-gray-100 min-h-screen font-sans flex flex-col">

    <nav class="bg-blue-800 p-4 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center text-white">
            <h1 class="font-display text-xl font-bold">🚌 FaceGuard Bus</h1>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <span class="text-gray-100">Olá, {{ user.first_name }}</span>
                    <a href="{% url 'login' %}" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded font-display font-semibold">Sair</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-800 text-white text-center p-4 mt-auto">
        <p class="text-sm">Sistema FaceGuard Bus &copy; 2026</p>
    </footer>
    {% if messages %}
        <div id="snackbar-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
            {% for message in messages %}
                <div class="snackbar transition-all duration-500 transform translate-y-10 opacity-0 pointer-events-auto flex items-center justify-between p-4 rounded shadow-2xl max-w-sm text-sm font-semibold
                    {% if message.tags == 'error' %} bg-red-600 text-white
                    {% elif message.tags == 'warning' %} bg-yellow-500 text-white
                    {% elif message.tags == 'success' %} bg-green-600 text-white
                    {% else %} bg-blue-600 text-white {% endif %}">
                    
                    <span>{{ message }}</span>
                    
                    <button onclick="this.parentElement.remove()" class="ml-4 text-white hover:text-gray-200 focus:outline-none text-lg leading-none">
                        &times;
                    </button>
                </div>
            {% endfor %}
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const snackbars = document.querySelectorAll('.snackbar');
                
                snackbars.forEach((snackbar, index) => {
                    // 1. Faz o Snackbar subir e aparecer (com um leve atraso se tiver mais de um)
                    setTimeout(() => {
                        snackbar.classList.remove('translate-y-10', 'opacity-0');
                    }, 100 * index);

                    // 2. Faz o Snackbar sumir automaticamente após 4 segundos (4000 ms)
                    setTimeout(() => {
                        snackbar.classList.add('opacity-0', 'translate-y-10');
                        // Remove do HTML depois que a animação terminar
                        setTimeout(() => snackbar.remove(), 500); 
                    }, 4000 + (100 * index));
                });
            });
        </script>
    {% endif %}

</body>
</html>
